<svg xmlns="http://www.w3.org/2000/svg" style="background: transparent;" viewBox="6 4 22 22">
  <!-- Outer shell: deep indigo-dark background -->
  
  <!-- Inner card: rich indigo surface -->
  <rect x="6" y="6" width="20" height="20" rx="5" fill="#1e1b3a"/>
  <!-- Rupee symbol in violet warmth -->
  <text x="16" y="22" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#a78bfa" font-weight="bold">₹</text>
  <!-- Notification dot: indigo primary -->
  <circle cx="24" cy="8" r="4" fill="#6c63ff"/>
  <!-- Divide symbol in near-white for contrast -->
  <text x="24" y="11" text-anchor="middle" font-family="sans-serif" font-size="6" fill="#f0eeff" font-weight="bold">÷</text>
</svg>